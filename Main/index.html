<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#5C0A0A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SGR-PPA" />
  <title>SGR-PPA</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Tailwind CDN (se compila en Fase 11) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Sistema de diseño propio -->
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <div id="app" style="display:flex; flex-direction:column; height:100vh; max-width:448px; margin:0 auto;">

    <header id="app-header">
      <h1 id="page-title">SGR-PPA</h1>
      <div class="header-action" id="header-action"></div>
    </header>

    <main id="app-main" style="flex:1; overflow-y:auto;">
      <div class="empty-state">
        <div class="spinner"></div>
      </div>
    </main>

    <nav id="app-nav" class="nav-safe-bottom"></nav>

  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
