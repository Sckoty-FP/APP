<!-- Perfil — datos del usuario y cierre de sesión -->
<div style="padding: var(--s4); padding-bottom: 80px;">

  <div style="max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--s4);">

    <!-- Avatar + nombre -->
    <div class="card" style="padding: var(--s6) var(--s4); display:flex; flex-direction:column; align-items:center; gap:var(--s3); text-align:center;">
      <div id="perfil-avatar" style="
        width: 72px; height: 72px; border-radius: 50%;
        background: var(--brand-gradient);
        display: flex; align-items: center; justify-content: center;
        font-size: var(--text-2xl); font-weight: var(--weight-bold); color: white;
        box-shadow: var(--shadow-brand);
        flex-shrink: 0;
      ">?</div>
      <div>
        <div id="perfil-nombre" style="font-size:var(--text-lg); font-weight:var(--weight-bold); color:var(--text-primary);">—</div>
        <div id="perfil-email" style="font-size:var(--text-sm); color:var(--text-tertiary); margin-top:2px;">—</div>
      </div>
      <div id="perfil-rol-badge" style="
        display: inline-flex; align-items: center;
        padding: 5px 14px; border-radius: var(--r-full);
        background: var(--brand-light); color: var(--brand-dark);
        font-size: var(--text-xs); font-weight: var(--weight-semi);
      ">—</div>
    </div>

    <!-- Info -->
    <div class="card" style="padding: 0; overflow: hidden;">
      <div id="perfil-info-rows"></div>
    </div>

    <!-- Logout -->
    <button
      onclick="if(confirm('¿Cerrás sesión?')) window.__authLogout()"
      style="
        width: 100%; padding: 14px; border-radius: var(--r-lg);
        background: var(--danger-bg); border: 1px solid var(--danger-border);
        color: var(--danger-text); font-size: var(--text-sm);
        font-weight: var(--weight-semi); cursor: pointer;
        transition: background var(--t-fast);
        font-family: var(--font);
      "
      onmouseover="this.style.background='#fee2e2'"
      onmouseout="this.style.background='var(--danger-bg)'"
    >
      Cerrar sesión
    </button>

  </div>

</div>

<script>
(function () {
  const user = window.__getCurrentUser?.();
  if (!user) return;

  const ROL_LABEL = { supervisor: 'Supervisor', jefe_zona: 'Jefe de Zona', jefe_equipo: 'Jefe de Equipo' };

  // Iniciales
  const iniciales = user.nombre.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase();
  document.getElementById('perfil-avatar').textContent = iniciales;
  document.getElementById('perfil-nombre').textContent = user.nombre;
  document.getElementById('perfil-email').textContent  = user.email;
  document.getElementById('perfil-rol-badge').textContent = ROL_LABEL[user.rol] ?? user.rol;

  // Filas de info
  function infoRow(label, value) {
    return `
      <div style="
        display: flex; align-items: center; justify-content: space-between;
        padding: var(--s3) var(--s4); border-bottom: 1px solid var(--border);
      ">
        <span style="font-size:var(--text-sm); color:var(--text-tertiary); font-weight:var(--weight-medium);">${label}</span>
        <span style="font-size:var(--text-sm); color:var(--text-primary); font-weight:var(--weight-semi);">${value}</span>
      </div>`;
  }

  const rows = document.getElementById('perfil-info-rows');
  if (rows) {
    rows.innerHTML =
      infoRow('Nombre',  user.nombre) +
      infoRow('Correo',  user.email) +
      infoRow('Rol',     ROL_LABEL[user.rol] ?? user.rol) +
      `<div style="padding:var(--s3) var(--s4); display:flex; align-items:center; justify-content:space-between;">
         <span style="font-size:var(--text-sm); color:var(--text-tertiary); font-weight:var(--weight-medium);">Estado</span>
         <span style="display:inline-flex; align-items:center; gap:5px; font-size:var(--text-xs); font-weight:var(--weight-semi); color:var(--rescatada-text);">
           <span style="width:7px; height:7px; border-radius:50%; background:var(--rescatada-accent);"></span>
           Activo
         </span>
       </div>`;
  }
})();
</script>
