<!-- Inicio — dashboard de bienvenida -->
<div style="padding: var(--s4); padding-bottom: 80px;">

  <!-- Saludo -->
  <div id="saludo-card" style="
    background: var(--brand-gradient);
    border-radius: var(--r-lg);
    padding: var(--s5) var(--s4);
    margin-bottom: var(--s4);
    box-shadow: var(--shadow-brand);
  ">
    <div style="font-size:var(--text-xs); color:rgba(254,242,242,0.7); font-weight:var(--weight-medium); letter-spacing:0.04em; margin-bottom:4px;">
      SGR-PPA
    </div>
    <div id="saludo-nombre" style="font-size:var(--text-xl); font-weight:var(--weight-bold); color:#FFF; margin-bottom:6px;">
      Cargando…
    </div>
    <div id="saludo-rol" style="display:inline-flex; align-items:center; padding:3px 10px; border-radius:var(--r-full);
         background:rgba(255,255,255,0.15); font-size:var(--text-xs); font-weight:var(--weight-semi); color:rgba(254,242,242,0.9);">
    </div>
  </div>

  <!-- KPIs rápidos -->
  <div id="kpi-mini" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--s2); margin-bottom:var(--s5);">
    <div class="skeleton" style="height:72px; border-radius:var(--r-md);"></div>
    <div class="skeleton" style="height:72px; border-radius:var(--r-md);"></div>
    <div class="skeleton" style="height:72px; border-radius:var(--r-md);"></div>
  </div>

  <!-- Recientes -->
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--s3);">
    <div style="font-size:var(--text-sm); font-weight:var(--weight-semi); color:var(--text-primary);">Recientes</div>
    <button onclick="window.__navigate('#/expedientes')"
            style="font-size:var(--text-xs); color:var(--brand); font-weight:var(--weight-semi); background:none; border:none; cursor:pointer;">
      Ver todos →
    </button>
  </div>
  <div id="recientes-list" class="card-list">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

</div>

<script>
(async function () {
  const { listarExpedientes, ESTADO_LABEL } = await import('/js/expedientes.js');
  const { obtenerKpiResumen }               = await import('/js/estadisticas.js');

  const user = window.__getCurrentUser?.();

  // Saludo
  const ROL_LABEL = { admin_ppa: 'AdminPPA', delegado: 'Delegado', jefe_equipo: 'Jefe de Equipo' };
  if (user) {
    document.getElementById('saludo-nombre').textContent = `Hola, ${user.nombre.split(' ')[0]}`;
    document.getElementById('saludo-rol').textContent    = ROL_LABEL[user.rol] ?? user.rol;
  }

  // KPIs mini
  function miniCard(label, value, color) {
    return `
      <div style="
        background:var(--surface); border-radius:var(--r-md); padding:var(--s3);
        border:1px solid var(--border); box-shadow:var(--shadow-xs); text-align:center;
      ">
        <div style="font-size:var(--text-2xl); font-weight:var(--weight-bold); color:${color}; line-height:1;">${value}</div>
        <div style="font-size:10px; color:var(--text-tertiary); font-weight:var(--weight-medium); margin-top:4px;">${label}</div>
      </div>`;
  }

  // Tarjeta expediente (idéntica a la de expedientes.html)
  function tarjeta(e) {
    const fecha = new Date(e.fecha_creacion).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' });
    return `
      <div class="card card-expediente estado-${e.estado}"
           role="button" tabindex="0"
           onclick="window.__navigate('#/expediente?id=${e.id}')"
           onkeydown="if(event.key==='Enter')window.__navigate('#/expediente?id=${e.id}')">
        <div class="card-accent"></div>
        <div class="card-body">
          <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:4px;">
            <div style="flex:1; min-width:0;">
              <div class="card-num">#${e.mantenimiento}</div>
              <div class="card-title">${e.instalacion}</div>
            </div>
            <span class="badge badge-${e.estado}" style="flex-shrink:0; margin-top:2px;">${ESTADO_LABEL[e.estado]}</span>
          </div>
          <div class="card-footer">
            <span class="card-meta">${e.jefe?.nombre ?? '—'}</span>
            <span class="card-meta">${fecha}</span>
          </div>
        </div>
        <svg class="card-chevron" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </div>`;
  }

  // Cargar en paralelo
  try {
    const [resumen, recientes] = await Promise.all([
      obtenerKpiResumen(),
      listarExpedientes({ limit: 5 }),
    ]);

    const activos = (resumen.pendiente || 0) + (resumen.en_gestion || 0) + (resumen.pend_revision || 0);

    const kpiMini = document.getElementById('kpi-mini');
    if (kpiMini) {
      kpiMini.innerHTML =
        miniCard('Total', resumen.total || 0, 'var(--text-primary)') +
        miniCard('Activos', activos, 'var(--gestion-accent)') +
        miniCard('Rescatados', resumen.rescatada || 0, 'var(--rescatada-accent)');
    }

    const listEl = document.getElementById('recientes-list');
    if (listEl) {
      listEl.innerHTML = recientes.length
        ? recientes.map(tarjeta).join('')
        : `<div class="empty-state">
             <div class="empty-title">Sin expedientes</div>
             <div class="empty-body">Aún no hay expedientes registrados.</div>
           </div>`;
    }
  } catch (err) {
    const kpiMini = document.getElementById('kpi-mini');
    if (kpiMini) {
      kpiMini.innerHTML = `
        <div style="grid-column:1/-1; color:var(--danger); font-size:var(--text-sm);">${err.message}</div>`;
    }
  }
})();
</script>
