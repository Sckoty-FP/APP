<!-- Gestión de técnicos — admin_ppa y delegado -->
<div style="padding-bottom: 80px;">

  <!-- Cabecera -->
  <div style="padding: var(--s4) var(--s4) var(--s3);">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--s3);">
      <div style="font-size:var(--text-xs); font-weight:var(--weight-semi); color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.06em;">
        Técnicos
      </div>
      <button
        id="btn-nuevo-tecnico"
        style="
          height:36px; padding:0 14px;
          border-radius:var(--r-md);
          background:var(--brand-gradient);
          border:none; cursor:pointer;
          color:white; font-size:var(--text-sm); font-weight:var(--weight-semi);
          font-family:var(--font); display:flex; align-items:center; gap:6px;
          box-shadow:0 2px 8px var(--brand-shadow);
        "
      >
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Nuevo técnico
      </button>
    </div>

    <!-- Filtro por jefe -->
    <select id="filtro-jefe" class="select" style="width:100%;">
      <option value="">Todos los jefes de equipo</option>
    </select>
  </div>

  <!-- Lista de técnicos -->
  <div id="tecnicos-list" style="padding: 0 var(--s4); display:flex; flex-direction:column; gap:var(--s2);">
    <div class="skeleton" style="height:72px; border-radius:var(--r-lg);"></div>
    <div class="skeleton" style="height:72px; border-radius:var(--r-lg);"></div>
    <div class="skeleton" style="height:72px; border-radius:var(--r-lg);"></div>
  </div>

  <!-- Panel crear técnico -->
  <div id="panel-crear" style="
    position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,0.5);
    display:none; align-items:flex-end; justify-content:center;
  ">
    <div style="
      width:100%; max-width:448px;
      background:var(--surface-2);
      border-radius:var(--r-xl) var(--r-xl) 0 0;
      padding:var(--s5) var(--s4) calc(var(--s5) + env(safe-area-inset-bottom, 0px));
      box-shadow:0 -8px 32px rgba(0,0,0,0.18);
    ">
      <div style="
        width:36px; height:4px; border-radius:2px;
        background:var(--border-strong); margin:0 auto var(--s4);
      "></div>

      <div style="font-size:var(--text-md); font-weight:var(--weight-bold); color:var(--text-primary); margin-bottom:var(--s4);">
        Nuevo técnico
      </div>

      <div style="display:flex; flex-direction:column; gap:var(--s3);">
        <div>
          <label class="label">Nombre completo</label>
          <input id="nt-nombre" type="text" class="input" placeholder="Nombre Apellido" autocomplete="off" />
        </div>
        <div>
          <label class="label">Matrícula</label>
          <input id="nt-matricula" type="text" class="input" placeholder="Ej: P61549" autocomplete="off"
            style="text-transform:uppercase;" />
        </div>
        <div>
          <label class="label">Jefe de equipo</label>
          <select id="nt-jefe" class="select" style="width:100%;">
            <option value="">Seleccionar jefe…</option>
          </select>
        </div>

        <div id="nt-error" style="display:none; color:var(--danger); font-size:var(--text-sm);"></div>

        <div style="display:flex; gap:var(--s2); margin-top:var(--s1);">
          <button id="btn-cancelar-crear" style="
            flex:1; height:44px; border-radius:var(--r-md);
            border:1.5px solid var(--border-strong);
            background:var(--surface); color:var(--text-secondary);
            font-size:var(--text-sm); font-weight:var(--weight-semi);
            font-family:var(--font); cursor:pointer;
          ">Cancelar</button>
          <button id="btn-confirmar-crear" style="
            flex:2; height:44px; border-radius:var(--r-md);
            border:none; background:var(--brand-gradient);
            color:white; font-size:var(--text-sm); font-weight:var(--weight-semi);
            font-family:var(--font); cursor:pointer;
            box-shadow:0 2px 8px var(--brand-shadow);
          ">Crear técnico</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(async function () {
  const user = window.__getCurrentUser?.();
  if (!user || (user.rol !== 'admin_ppa' && user.rol !== 'delegado')) {
    document.querySelector('[style*="padding-bottom"]').innerHTML =
      '<div class="empty-state"><div class="empty-title">Sin acceso</div><div class="empty-sub">Esta sección es solo para administradores.</div></div>';
    return;
  }

  const { listarTecnicos, listarJefesEquipo, crearTecnico, toggleActivoTecnico, cambiarJefeTecnico } =
    await import('/js/tecnicos.js');

  let _jefes = [];

  // ── Tarjeta de técnico ──────────────────────────────────────
  function tarjeta(t) {
    const initials = t.nombre.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase();
    return `
      <div style="
        background:var(--surface);
        border:1px solid var(--border);
        border-radius:var(--r-lg);
        padding:var(--s3) var(--s4);
        display:flex; align-items:center; gap:var(--s3);
        opacity:${t.activo ? 1 : 0.5};
      ">
        <!-- Avatar -->
        <div style="
          width:40px; height:40px; border-radius:50%; flex-shrink:0;
          background:var(--surface-2); border:1.5px solid var(--border-strong);
          display:flex; align-items:center; justify-content:center;
          font-size:var(--text-sm); font-weight:var(--weight-bold); color:var(--text-secondary);
        ">${initials}</div>

        <!-- Info -->
        <div style="flex:1; min-width:0;">
          <div style="
            font-size:var(--text-sm); font-weight:var(--weight-semi);
            color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
          ">${t.nombre}</div>
          <div style="display:flex; align-items:center; gap:6px; margin-top:2px;">
            ${t.matricula ? `<span style="
              font-size:10px; font-weight:700; padding:2px 7px;
              border-radius:var(--r-full);
              background:var(--surface-2); color:var(--text-secondary);
              border:1px solid var(--border-strong); font-family:monospace;
            ">${t.matricula}</span>` : ''}
            <span style="font-size:var(--text-xs); color:var(--text-tertiary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
              ${t.jefe_nombre}
            </span>
          </div>
        </div>

        <!-- Acciones -->
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0;">
          <select
            onchange="window.__cambiarJefeTecnico('${t.id}', this.value)"
            style="
              font-size:10px; font-weight:600; padding:3px 6px;
              border-radius:var(--r-full);
              background:var(--surface-2); color:var(--text-secondary);
              border:1px solid var(--border-strong);
              cursor:pointer; font-family:var(--font); max-width:110px;
            "
          >
            ${_jefes.map(j => `<option value="${j.id}" ${j.id === t.jefe_id ? 'selected' : ''}>${j.nombre.split(' ')[0]}</option>`).join('')}
          </select>
          <button
            onclick="window.__toggleActivoTecnico('${t.id}', ${!t.activo})"
            title="${t.activo ? 'Desactivar' : 'Activar'}"
            style="
              width:28px; height:28px; border-radius:var(--r-sm);
              border:1px solid var(--border-strong);
              background:var(--surface-2); cursor:pointer;
              display:flex; align-items:center; justify-content:center;
              color:${t.activo ? 'var(--danger)' : 'var(--success)'};
            "
          >
            ${t.activo
              ? `<svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>`
              : `<svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`
            }
          </button>
        </div>
      </div>`;
  }

  // ── Cargar lista ──────────────────────────────────────────────
  async function cargar() {
    const listEl   = document.getElementById('tecnicos-list');
    const jefeId   = document.getElementById('filtro-jefe')?.value || undefined;
    if (!listEl) return;
    try {
      const tecnicos = await listarTecnicos({ jefeId: jefeId || undefined });
      if (!tecnicos.length) {
        listEl.innerHTML = `<div class="empty-state"><div class="empty-title">Sin técnicos</div><div class="empty-sub">Creá el primero con el botón de arriba.</div></div>`;
        return;
      }
      listEl.innerHTML = tecnicos.map(tarjeta).join('');
    } catch (err) {
      listEl.innerHTML = `<div class="empty-state"><p style="color:var(--danger);font-size:var(--text-sm);">${err.message}</p></div>`;
    }
  }

  // ── Cargar jefes en filtro y selector ─────────────────────────
  async function cargarJefes() {
    _jefes = await listarJefesEquipo();
    const filtroEl = document.getElementById('filtro-jefe');
    if (filtroEl) {
      filtroEl.innerHTML = '<option value="">Todos los jefes de equipo</option>' +
        _jefes.map(j => `<option value="${j.id}">${j.nombre}</option>`).join('');
    }
    const ntJefeEl = document.getElementById('nt-jefe');
    if (ntJefeEl) {
      ntJefeEl.innerHTML = '<option value="">Seleccionar jefe…</option>' +
        _jefes.map(j => `<option value="${j.id}">${j.nombre}</option>`).join('');
    }
  }

  await cargarJefes();
  await cargar();

  document.getElementById('filtro-jefe')?.addEventListener('change', cargar);

  // ── Acciones globales (usadas desde tarjetas) ────────────────
  window.__toggleActivoTecnico = async function (id, nuevoActivo) {
    const accion = nuevoActivo ? 'activar' : 'desactivar';
    if (!confirm(`¿Querés ${accion} este técnico?`)) return;
    try {
      await toggleActivoTecnico(id, nuevoActivo);
      cargar();
    } catch (err) {
      alert(err.message);
    }
  };

  window.__cambiarJefeTecnico = async function (id, jefeId) {
    try {
      await cambiarJefeTecnico(id, jefeId);
      cargar();
    } catch (err) {
      alert(err.message);
    }
  };

  // ── Panel crear ───────────────────────────────────────────────
  const panel = document.getElementById('panel-crear');

  document.getElementById('btn-nuevo-tecnico').addEventListener('click', () => {
    panel.style.display = 'flex';
  });

  document.getElementById('btn-cancelar-crear').addEventListener('click', () => {
    panel.style.display = 'none';
    limpiar();
  });

  panel.addEventListener('click', e => {
    if (e.target === panel) { panel.style.display = 'none'; limpiar(); }
  });

  function limpiar() {
    document.getElementById('nt-nombre').value    = '';
    document.getElementById('nt-matricula').value = '';
    document.getElementById('nt-jefe').value      = '';
    mostrarError('');
  }

  function mostrarError(msg) {
    const el = document.getElementById('nt-error');
    el.textContent   = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  document.getElementById('btn-confirmar-crear').addEventListener('click', async () => {
    const nombre    = document.getElementById('nt-nombre').value.trim();
    const matricula = document.getElementById('nt-matricula').value.trim();
    const jefe_id   = document.getElementById('nt-jefe').value;

    if (!nombre || !jefe_id) {
      mostrarError('Completá el nombre y el jefe de equipo.');
      return;
    }

    const btn = document.getElementById('btn-confirmar-crear');
    btn.textContent = 'Creando…';
    btn.disabled = true;

    try {
      await crearTecnico({ nombre, matricula, jefe_id });
      panel.style.display = 'none';
      limpiar();
      cargar();
    } catch (err) {
      mostrarError(err.message);
    } finally {
      btn.textContent = 'Crear técnico';
      btn.disabled = false;
    }
  });
})();
</script>
