<!-- Expedientes — lista con búsqueda y filtros -->
<div style="padding-bottom: 80px;">

  <!-- Barra superior: búsqueda + filtros + exportar + importar -->
  <!-- Acciones (ocultas hasta que cargue la lista, visibles para admin_ppa y delegado) -->
  <div id="export-bar" style="display:none; padding: var(--s3) var(--s4) 0; justify-content:flex-end; gap:var(--s2);">
    <input type="file" id="importar-input" accept=".xlsx" style="display:none;" />
    <button id="btn-importar-excel" style="
      height:36px; padding:0 14px;
      border-radius:var(--r-md);
      border:1.5px solid var(--border-strong);
      background:var(--surface); color:var(--text-secondary);
      font-size:var(--text-xs); font-weight:var(--weight-semi);
      cursor:pointer; display:flex; align-items:center; gap:6px;
      font-family:var(--font); transition:all var(--t-fast);
    ">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
      </svg>
      Importar Excel
    </button>
    <button id="btn-exportar-pdf" style="
      height:36px; padding:0 14px;
      border-radius:var(--r-md);
      border:1.5px solid var(--border-strong);
      background:var(--surface); color:var(--text-secondary);
      font-size:var(--text-xs); font-weight:var(--weight-semi);
      cursor:pointer; display:flex; align-items:center; gap:6px;
      font-family:var(--font); transition:all var(--t-fast);
    ">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      </svg>
      Exportar PDF
    </button>
  </div>

  <!-- Modal importación Excel -->
  <div id="import-modal" style="
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.5);
    display:none; align-items:flex-end; justify-content:center;
  ">
    <div style="
      width:100%; max-width:448px;
      background:var(--surface-2);
      border-radius:var(--r-xl) var(--r-xl) 0 0;
      padding:var(--s5) var(--s4) calc(var(--s5) + env(safe-area-inset-bottom, 0px));
      box-shadow:0 -8px 32px rgba(0,0,0,0.18);
      max-height:85vh; overflow-y:auto;
    ">
      <div id="import-modal-content"></div>
    </div>
  </div>

  <!-- Búsqueda + botón filtros -->
  <div style="padding: var(--s4) var(--s4) 0; display:flex; gap:var(--s2);">
    <div style="position:relative; flex:1;">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"
           style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);pointer-events:none;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
      </svg>
      <input
        id="exp-search"
        class="input"
        type="search"
        placeholder="Instalación o nº mantenimiento…"
        autocomplete="off"
        style="padding-left:36px;"
      />
    </div>
    <!-- Botón filtros extra -->
    <button
      id="btn-filtros"
      style="
        flex-shrink:0; height:44px; padding:0 14px;
        border-radius:var(--r-md); border:1.5px solid var(--border-strong);
        background:var(--surface); color:var(--text-secondary);
        font-size:var(--text-sm); font-weight:var(--weight-semi);
        cursor:pointer; display:flex; align-items:center; gap:6px;
        font-family:var(--font); transition:all var(--t-fast); white-space:nowrap;
      "
    >
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 4h18M7 12h10M11 20h2"/>
      </svg>
      Filtros
      <span id="filtros-badge" style="
        display:none; min-width:18px; height:18px; border-radius:var(--r-full);
        background:var(--brand); color:white; font-size:10px; font-weight:700;
        align-items:center; justify-content:center; padding:0 4px;
      ">0</span>
    </button>
  </div>

  <!-- Filtros de estado (pills) -->
  <div style="overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; padding:var(--s3) var(--s4) 0;">
    <div id="exp-filters" style="display:flex; gap:6px; width:max-content; padding-bottom:var(--s3);">
      <button class="pill-filter pill-active" data-estado="">Todos</button>
      <button class="pill-filter" data-estado="pendiente">Pendiente</button>
      <button class="pill-filter" data-estado="en_gestion">Acción Pendiente</button>
      <button class="pill-filter" data-estado="pendiente_revision">Pte Aprobación</button>
      <button class="pill-filter" data-estado="rescatada">Rescatada</button>
      <button class="pill-filter" data-estado="cerrada">No Recuperable</button>
    </div>
  </div>

  <!-- Panel de filtros extra (colapsable) -->
  <div id="panel-filtros" style="
    overflow:hidden; max-height:0;
    transition:max-height 260ms cubic-bezier(0.16,1,0.3,1);
    padding:0 var(--s4);
  ">
    <div style="
      background:var(--surface); border:1px solid var(--border-strong);
      border-radius:var(--r-lg); padding:var(--s4);
      display:flex; flex-direction:column; gap:var(--s3);
      margin-bottom:var(--s3);
    ">
      <!-- Jefe de equipo (solo admin_ppa / delegado) -->
      <div id="filtro-jefe-wrap" style="display:none;">
        <label style="font-size:var(--text-xs); font-weight:var(--weight-semi); color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.05em; display:block; margin-bottom:6px;">
          Jefe de equipo
        </label>
        <select id="filtro-jefe" class="select" style="width:100%;">
          <option value="">Todos los jefes</option>
        </select>
      </div>

      <!-- Rango de fechas -->
      <div>
        <label style="font-size:var(--text-xs); font-weight:var(--weight-semi); color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.05em; display:block; margin-bottom:6px;">
          Periodo
        </label>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--s2);">
          <div>
            <div style="font-size:var(--text-xs); color:var(--text-tertiary); margin-bottom:4px;">Desde</div>
            <input id="filtro-desde" type="date" class="input" style="font-size:var(--text-sm); padding:10px 12px;" />
          </div>
          <div>
            <div style="font-size:var(--text-xs); color:var(--text-tertiary); margin-bottom:4px;">Hasta</div>
            <input id="filtro-hasta" type="date" class="input" style="font-size:var(--text-sm); padding:10px 12px;" />
          </div>
        </div>
      </div>

      <!-- Limpiar -->
      <button id="btn-limpiar-filtros" style="
        background:none; border:none; color:var(--text-tertiary);
        font-size:var(--text-xs); font-weight:var(--weight-semi);
        cursor:pointer; text-align:right; font-family:var(--font);
        padding:0; align-self:flex-end;
      ">Limpiar filtros extra</button>
    </div>
  </div>

  <!-- Lista -->
  <div id="exp-list" class="card-list">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

  <!-- FAB nuevo — solo supervisor -->
  <button
    id="exp-fab"
    aria-label="Nuevo expediente"
    style="
      position:fixed; bottom:76px; right:20px;
      width:52px; height:52px; border-radius:50%;
      background:var(--brand-gradient);
      border:none; cursor:pointer;
      box-shadow:0 4px 20px var(--brand-shadow);
      color:white; font-size:26px; font-weight:300;
      display:none; align-items:center; justify-content:center;
      z-index:50;
      transition:transform var(--t-fast), box-shadow var(--t-fast);
    "
  >+</button>

</div>

<script>
(async function () {
  const [expMod, notifMod] = await Promise.all([
    import('/js/expedientes.js'),
    import('/js/notificaciones.js'),
  ]);
  const { listarExpedientes, listarJefesEquipo, ESTADO_LABEL } = expMod;
  const { getExpedientesConNotif, limpiarNotifExpediente }     = notifMod;
  const rol = window.__getCurrentRol?.();

  // FAB — admin_ppa y delegado pueden crear expedientes (Módulo C)
  const fab = document.getElementById('exp-fab');
  if (rol === 'admin_ppa' || rol === 'delegado') {
    fab.style.display = 'flex';
    fab.addEventListener('click', () => window.__navigate('#/nuevo'));
  }

  // Exportar PDF — admin_ppa y delegado
  let _ultimaLista = [];
  if (rol === 'admin_ppa' || rol === 'delegado') {
    const exportBar = document.getElementById('export-bar');
    if (exportBar) exportBar.style.display = 'flex';
    document.getElementById('btn-exportar-pdf')?.addEventListener('click', async () => {
      if (!_ultimaLista.length) return;
      const btn = document.getElementById('btn-exportar-pdf');
      btn.textContent = 'Generando…';
      btn.disabled = true;
      try {
        const { exportarExpedientes } = await import('/js/exportacion.js');
        const filtrosDesc = [
          estadoActivo && `Estado: ${ESTADO_LABEL[estadoActivo] ?? estadoActivo}`,
          busqueda     && `Búsqueda: "${busqueda}"`,
          jefeId       && `Jefe filtrado`,
          (fechaDesde || fechaHasta) && `Periodo: ${fechaDesde || '…'} — ${fechaHasta || '…'}`,
        ].filter(Boolean).join(' · ') || null;
        await exportarExpedientes(_ultimaLista, filtrosDesc);
      } finally {
        btn.innerHTML = `<svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg> Exportar PDF`;
        btn.disabled = false;
      }
    });
  }

  // ── Restaurar filtros desde URL ─────────────────────────
  const params     = window.__getRouteParams?.() ?? new URLSearchParams();
  let estadoActivo = params.get('estado')  ?? '';
  let busqueda     = params.get('q')       ?? '';
  let jefeId       = params.get('jefe')    ?? '';
  let fechaDesde   = params.get('desde')   ?? '';
  let fechaHasta   = params.get('hasta')   ?? '';

  // Aplicar estado inicial a pills
  if (estadoActivo) {
    document.querySelectorAll('#exp-filters .pill-filter').forEach(b =>
      b.classList.toggle('pill-active', b.dataset.estado === estadoActivo)
    );
  }

  // Aplicar búsqueda inicial
  const searchEl = document.getElementById('exp-search');
  if (searchEl && busqueda) searchEl.value = busqueda;

  // Aplicar fechas iniciales
  if (fechaDesde) document.getElementById('filtro-desde').value = fechaDesde;
  if (fechaHasta) document.getElementById('filtro-hasta').value = fechaHasta;

  // ── Cargar jefes (admin_ppa / delegado) ──────────────
  if (rol === 'admin_ppa' || rol === 'delegado') {
    const jefeWrap = document.getElementById('filtro-jefe-wrap');
    jefeWrap.style.display = 'block';
    try {
      const jefes = await listarJefesEquipo();
      const sel   = document.getElementById('filtro-jefe');
      jefes.forEach(j => {
        const opt = document.createElement('option');
        opt.value = j.id;
        opt.textContent = j.nombre;
        if (j.id === jefeId) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => {
        jefeId = sel.value;
        actualizarURL();
        actualizarBadge();
        cargar();
      });
    } catch {}
  }

  // ── URL ────────────────────────────────────────────────
  function actualizarURL() {
    const p = new URLSearchParams();
    if (estadoActivo) p.set('estado', estadoActivo);
    if (busqueda)     p.set('q',      busqueda);
    if (jefeId)       p.set('jefe',   jefeId);
    if (fechaDesde)   p.set('desde',  fechaDesde);
    if (fechaHasta)   p.set('hasta',  fechaHasta);
    const qs = p.toString();
    history.replaceState(null, '', '#/expedientes' + (qs ? '?' + qs : ''));
  }

  // ── Badge de filtros activos ───────────────────────────
  function actualizarBadge() {
    const activos = (jefeId ? 1 : 0) + (fechaDesde ? 1 : 0) + (fechaHasta ? 1 : 0);
    const badge   = document.getElementById('filtros-badge');
    const btn     = document.getElementById('btn-filtros');
    badge.textContent    = activos;
    badge.style.display  = activos > 0 ? 'flex' : 'none';
    btn.style.borderColor = activos > 0 ? 'var(--brand)' : 'var(--border-strong)';
    btn.style.color       = activos > 0 ? 'var(--brand)' : 'var(--text-secondary)';
  }

  // ── Toggle panel filtros ───────────────────────────────
  let panelAbierto = false;
  const panel = document.getElementById('panel-filtros');

  // Abrir si hay filtros activos al restaurar
  if (jefeId || fechaDesde || fechaHasta) {
    panelAbierto = true;
    panel.style.maxHeight = '400px';
    actualizarBadge();
  }

  document.getElementById('btn-filtros').addEventListener('click', () => {
    panelAbierto = !panelAbierto;
    panel.style.maxHeight = panelAbierto ? '400px' : '0';
  });

  // ── Fechas ─────────────────────────────────────────────
  document.getElementById('filtro-desde').addEventListener('change', e => {
    fechaDesde = e.target.value;
    actualizarURL();
    actualizarBadge();
    cargar();
  });

  document.getElementById('filtro-hasta').addEventListener('change', e => {
    fechaHasta = e.target.value;
    actualizarURL();
    actualizarBadge();
    cargar();
  });

  // ── Limpiar filtros extra ──────────────────────────────
  document.getElementById('btn-limpiar-filtros').addEventListener('click', () => {
    jefeId = fechaDesde = fechaHasta = '';
    document.getElementById('filtro-jefe').value  = '';
    document.getElementById('filtro-desde').value = '';
    document.getElementById('filtro-hasta').value = '';
    actualizarURL();
    actualizarBadge();
    cargar();
  });

  // ── Tarjeta expediente ─────────────────────────────────
  function tarjeta(e, conNotif = false) {
    const fecha   = new Date(e.fecha_creacion).toLocaleDateString('es-ES', { day:'2-digit', month:'2-digit', year:'2-digit' });
    const tecnico = e.tecnico ? `<span style="color:var(--text-tertiary)"> · ${e.tecnico.nombre}</span>` : '';
    const dotNotif = `<span id="card-notif-${e.id}" class="card-notif-dot" style="${conNotif ? '' : 'display:none'}">!</span>`;
    return `
      <div class="card card-expediente estado-${e.estado}"
           role="button" tabindex="0"
           onclick="window.__navigate('#/expediente?id=${e.id}')"
           onkeydown="if(event.key==='Enter')window.__navigate('#/expediente?id=${e.id}')">
        <div class="card-accent"></div>
        <div class="card-body">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;">
            <div style="flex:1;min-width:0;">
              <div class="card-num" style="display:flex;align-items:center;">#${e.mantenimiento}${dotNotif}</div>
              <div class="card-title">${e.instalacion}</div>
            </div>
            <span class="badge badge-${e.estado}" style="flex-shrink:0;margin-top:2px;">${ESTADO_LABEL[e.estado]}</span>
          </div>
          <div class="card-motivo">${e.motivo_fallo?.nombre ?? e.motivo ?? '—'}</div>
          <div class="card-footer">
            <span class="card-meta">${e.jefe?.nombre ?? '—'}${tecnico}</span>
            <span class="card-meta">${fecha}</span>
          </div>
        </div>
        <svg class="card-chevron" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </div>`;
  }

  // ── Cargar lista ───────────────────────────────────────
  async function cargar() {
    const listEl = document.getElementById('exp-list');
    if (!listEl) return;
    listEl.innerHTML = `
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>`;
    try {
      const hayFiltros = estadoActivo || busqueda || jefeId || fechaDesde || fechaHasta;
      const exps = await listarExpedientes({
        estado:     estadoActivo || undefined,
        busqueda:   busqueda     || undefined,
        jefeId:     jefeId       || undefined,
        fechaDesde: fechaDesde   || undefined,
        fechaHasta: fechaHasta   || undefined,
      });
      if (!exps.length) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">
              <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
            </div>
            <div class="empty-title">Sin expedientes</div>
            <div class="empty-body">No hay expedientes${hayFiltros ? ' con estos filtros' : ' todavía'}.</div>
          </div>`;
        return;
      }
      _ultimaLista = exps;
      const conNotif = getExpedientesConNotif();
      listEl.innerHTML = exps.map(e => tarjeta(e, conNotif.has(e.id))).join('');
    } catch (err) {
      listEl.innerHTML = `
        <div class="empty-state">
          <p style="color:var(--danger);font-size:var(--text-sm);">${err.message}</p>
        </div>`;
    }
  }

  // ── Filtros de estado (pills) ──────────────────────────
  document.getElementById('exp-filters')?.addEventListener('click', ev => {
    const btn = ev.target.closest('[data-estado]');
    if (!btn) return;
    document.querySelectorAll('#exp-filters .pill-filter').forEach(b => b.classList.remove('pill-active'));
    btn.classList.add('pill-active');
    estadoActivo = btn.dataset.estado;
    actualizarURL();
    cargar();
  });

  // ── Búsqueda con debounce ──────────────────────────────
  let debounceTimer;
  searchEl?.addEventListener('input', () => {
    busqueda = searchEl.value;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { actualizarURL(); cargar(); }, 320);
  });

  cargar();

  // ── Importación Excel ──────────────────────────────────────
  if (rol === 'admin_ppa' || rol === 'delegado') {
    const importInput  = document.getElementById('importar-input');
    const btnImportar  = document.getElementById('btn-importar-excel');
    const modal        = document.getElementById('import-modal');
    const modalContent = document.getElementById('import-modal-content');

    const btnStyle = (label) => `
      flex:1; height:44px; border-radius:var(--r-md);
      border:1.5px solid var(--border-strong);
      background:var(--surface); color:var(--text-secondary);
      font-size:var(--text-sm); font-weight:var(--weight-semi);
      font-family:var(--font); cursor:pointer;`;

    const btnPrimaryStyle = `
      flex:2; height:44px; border-radius:var(--r-md);
      border:none; background:var(--brand-gradient);
      color:white; font-size:var(--text-sm); font-weight:var(--weight-semi);
      font-family:var(--font); cursor:pointer;
      box-shadow:0 2px 8px var(--brand-shadow);`;

    btnImportar?.addEventListener('click', () => importInput?.click());

    importInput?.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      e.target.value = '';

      modal.style.display = 'flex';
      modalContent.innerHTML = `
        <div style="text-align:center;padding:var(--s6) 0;">
          <div class="spinner" style="width:24px;height:24px;margin:0 auto;"></div>
          <div style="margin-top:var(--s3);color:var(--text-secondary);font-size:var(--text-sm);">Analizando archivo…</div>
        </div>`;

      try {
        const { parsearExcel, analizarFilas } = await import('/js/importacion.js');
        const filas = await parsearExcel(file);
        const { validas, duplicadas, errores, mapaTecnicos } = await analizarFilas(filas);
        window.__importDatos = { validas, mapaTecnicos };

        const erroresHtml = errores.length ? `
          <div style="margin-top:var(--s3);">
            <div style="font-size:var(--text-xs);font-weight:600;color:var(--danger);margin-bottom:6px;">Con errores (${errores.length}):</div>
            <div style="display:flex;flex-direction:column;gap:4px;max-height:110px;overflow-y:auto;">
              ${errores.map(er => `
                <div style="font-size:var(--text-xs);color:var(--danger);padding:4px 8px;background:var(--danger-bg);border-radius:var(--r-sm);">
                  Fila ${er.fila}: ${er.razones.join(' · ')}
                </div>`).join('')}
            </div>
          </div>` : '';

        modalContent.innerHTML = `
          <div style="width:36px;height:4px;border-radius:2px;background:var(--border-strong);margin:0 auto var(--s4);"></div>
          <div style="font-size:var(--text-md);font-weight:var(--weight-bold);color:var(--text-primary);margin-bottom:var(--s4);">Vista previa</div>
          <div style="display:flex;flex-direction:column;gap:var(--s2);margin-bottom:var(--s4);">
            <div style="display:flex;justify-content:space-between;font-size:var(--text-sm);padding:var(--s2) 0;border-bottom:1px solid var(--border);">
              <span style="color:var(--text-secondary);">Total en archivo</span>
              <strong>${filas.length}</strong>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:var(--text-sm);padding:var(--s2) 0;border-bottom:1px solid var(--border);">
              <span style="color:var(--success);">Válidos para importar</span>
              <strong style="color:var(--success);">${validas.length}</strong>
            </div>
            ${duplicadas.length ? `
            <div style="display:flex;justify-content:space-between;font-size:var(--text-sm);padding:var(--s2) 0;border-bottom:1px solid var(--border);">
              <span style="color:var(--text-tertiary);">Ya existen (se saltarán)</span>
              <strong style="color:var(--text-tertiary);">${duplicadas.length}</strong>
            </div>` : ''}
            ${errores.length ? `
            <div style="display:flex;justify-content:space-between;font-size:var(--text-sm);padding:var(--s2) 0;">
              <span style="color:var(--danger);">Con errores</span>
              <strong style="color:var(--danger);">${errores.length}</strong>
            </div>` : ''}
            ${erroresHtml}
          </div>
          <div style="display:flex;gap:var(--s2);">
            <button onclick="window.__cerrarImportModal()" style="${btnStyle()}">Cancelar</button>
            ${validas.length ? `<button id="btn-confirmar-import" onclick="window.__ejecutarImport()" style="${btnPrimaryStyle}">
              Importar ${validas.length} expediente${validas.length !== 1 ? 's' : ''}
            </button>` : ''}
          </div>`;
      } catch (err) {
        modalContent.innerHTML = `
          <div style="padding:var(--s4);">
            <div style="color:var(--danger);font-size:var(--text-sm);margin-bottom:var(--s4);">${err.message}</div>
            <button onclick="window.__cerrarImportModal()" style="${btnStyle()}">Cerrar</button>
          </div>`;
      }
    });

    window.__cerrarImportModal = function () {
      modal.style.display = 'none';
      modalContent.innerHTML = '';
      window.__importDatos = null;
      cargar();
    };

    window.__ejecutarImport = async function () {
      const btn = document.getElementById('btn-confirmar-import');
      if (btn) { btn.disabled = true; btn.textContent = 'Importando…'; }

      const user = window.__getCurrentUser?.();
      const { validas, mapaTecnicos } = window.__importDatos ?? {};
      if (!validas?.length || !user) return;

      try {
        const { ejecutarImport } = await import('/js/importacion.js');
        const { importados, errores } = await ejecutarImport(validas, user.id, mapaTecnicos);

        const erroresHtml = errores.length ? `
          <div style="margin-top:var(--s3);">
            <div style="font-size:var(--text-xs);font-weight:600;color:var(--danger);margin-bottom:6px;">Errores al insertar:</div>
            <div style="display:flex;flex-direction:column;gap:4px;max-height:100px;overflow-y:auto;">
              ${errores.map(er => `
                <div style="font-size:var(--text-xs);color:var(--danger);padding:4px 8px;background:var(--danger-bg);border-radius:var(--r-sm);">
                  Fila ${er.fila}: ${er.razones.join(' · ')}
                </div>`).join('')}
            </div>
          </div>` : '';

        modalContent.innerHTML = `
          <div style="width:36px;height:4px;border-radius:2px;background:var(--border-strong);margin:0 auto var(--s4);"></div>
          <div style="font-size:var(--text-md);font-weight:var(--weight-bold);color:var(--text-primary);margin-bottom:var(--s4);">Importación completada</div>
          <div style="display:flex;flex-direction:column;gap:var(--s2);margin-bottom:var(--s4);">
            <div style="display:flex;justify-content:space-between;font-size:var(--text-sm);padding:var(--s2) 0;border-bottom:1px solid var(--border);">
              <span style="color:var(--success);">Importados</span>
              <strong style="color:var(--success);">${importados.length}</strong>
            </div>
            ${errores.length ? `
            <div style="display:flex;justify-content:space-between;font-size:var(--text-sm);padding:var(--s2) 0;">
              <span style="color:var(--danger);">Errores al insertar</span>
              <strong style="color:var(--danger);">${errores.length}</strong>
            </div>` : ''}
            ${erroresHtml}
          </div>
          <button onclick="window.__cerrarImportModal()" style="${btnPrimaryStyle}">Cerrar</button>`;
      } catch (err) {
        modalContent.innerHTML = `
          <div style="padding:var(--s4);">
            <div style="color:var(--danger);font-size:var(--text-sm);margin-bottom:var(--s4);">${err.message}</div>
            <button onclick="window.__cerrarImportModal()" style="${btnStyle()}">Cerrar</button>
          </div>`;
      }
    };
  }

  // ── Badges en tiempo real ──────────────────────────────────
  document.addEventListener('notif:update', ({ detail }) => {
    const conNotif = getExpedientesConNotif();
    // Mostrar/ocultar badge en las cards ya renderizadas
    document.querySelectorAll('[id^="card-notif-"]').forEach(dot => {
      const expId = dot.id.replace('card-notif-', '');
      dot.style.display = conNotif.has(expId) ? '' : 'none';
    });
  });
})();
</script>
