<!-- Detalle de expediente + comentarios -->
<div style="padding-bottom: 200px;">

  <!-- Detalle -->
  <div id="exp-detail-wrap" style="padding: var(--s4); max-width: 560px; margin: 0 auto;">
    <div class="skeleton" style="height:140px;border-radius:var(--r-lg);margin-bottom:12px;"></div>
    <div class="skeleton skeleton-text" style="width:60%;margin-bottom:8px;"></div>
    <div class="skeleton skeleton-text" style="width:40%;"></div>
  </div>

  <!-- Máquina de estados (oculto hasta que cargue el expediente) -->
  <div id="estado-section" style="display:none; padding: 0 var(--s4) var(--s3); max-width: 560px; margin: 0 auto;"></div>

  <!-- Comentarios (oculto hasta que cargue el expediente) -->
  <div id="coment-section" style="display:none;">
    <div class="section-title" style="padding-left:var(--s4);">Comentarios</div>
    <div id="coment-thread" class="chat-thread">
      <div class="skeleton skeleton-text" style="width:55%;align-self:flex-start;"></div>
      <div class="skeleton skeleton-text" style="width:65%;align-self:flex-end;"></div>
    </div>
  </div>

</div>

<!-- Barra de input — fija sobre el nav (solo visible si puede comentar) -->
<div id="coment-input-bar" style="
  display: none;
  position: fixed;
  bottom: calc(58px + env(safe-area-inset-bottom, 0px));
  left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border-strong);
  padding: var(--s2) var(--s3);
  z-index: 10;
  box-shadow: 0 -4px 16px rgba(15,23,42,0.06);
">
  <div style="max-width:560px;margin:0 auto;">
  <!-- Previews de fotos seleccionadas -->
  <div id="fotos-preview" style="display:none;flex-wrap:wrap;gap:6px;margin-bottom:8px;"></div>

  <div style="display:flex;gap:var(--s2);align-items:flex-end;">
    <!-- Botón adjuntar foto -->
    <label
      for="foto-input"
      class="btn btn-secondary btn-sm"
      style="flex-shrink:0;min-width:44px;min-height:44px;cursor:pointer;"
      aria-label="Adjuntar foto"
    >
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
    </label>
    <input id="foto-input" type="file" accept="image/*" multiple style="display:none;" />

    <!-- Textarea comentario -->

    <textarea
      id="coment-texto"
      class="textarea"
      rows="1"
      placeholder="Escribí un comentario…"
      style="min-height:44px;max-height:120px;resize:none;flex:1;padding-top:12px;line-height:1.4;"
    ></textarea>

    <!-- Enviar -->
    <button
      id="btn-send"
      class="btn btn-primary btn-sm"
      style="flex-shrink:0;min-width:44px;min-height:44px;"
      disabled
      aria-label="Enviar comentario"
    >
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
      </svg>
    </button>
  </div>
  </div><!-- /max-width wrapper -->
</div>

<script>
(async function () {
  // ── Imports ────────────────────────────────────────────────
  const [expMod, comentMod, notifMod] = await Promise.all([
    import('/js/expedientes.js'),
    import('/js/comentarios.js'),
    import('/js/notificaciones.js'),
  ]);
  const { obtenerExpediente, listarJefesEquipo, listarTecnicosPorJefe, actualizarExpediente, cambiarEstado, ESTADO_LABEL } = expMod;
  const { listarComentarios, crearComentario, subirFoto, urlFirmada } = comentMod;
  const { limpiarNotifExpediente } = notifMod;

  const params = window.__getRouteParams?.() ?? new URLSearchParams();
  const id     = params.get('id');

  // Limpiar notificaciones de este expediente al abrirlo
  if (id) limpiarNotifExpediente(id);
  const user   = window.__getCurrentUser?.();
  const wrap   = document.getElementById('exp-detail-wrap');

  if (!id) {
    wrap.innerHTML = `<div class="empty-state"><p style="color:var(--danger);font-size:var(--text-sm);">ID de expediente no especificado.</p></div>`;
    return;
  }

  const esSupervisor   = user?.rol === 'supervisor';
  const puedeCommentar = user?.rol === 'supervisor' || user?.rol === 'jefe_equipo';

  // ── Render detalle ─────────────────────────────────────────
  function fmtFecha(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function renderDetalle(exp) {
    wrap.innerHTML = `
      <div class="card" style="padding:var(--s4);margin-bottom:var(--s3);">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s3);">
          <div style="flex:1;min-width:0;">
            <div style="font-size:var(--text-xs);color:var(--text-tertiary);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;">#${exp.mantenimiento}</div>
            <div style="font-size:var(--text-lg);font-weight:800;color:var(--text-primary);letter-spacing:-0.02em;line-height:1.2;">${exp.instalacion}</div>
          </div>
          <span class="badge badge-${exp.estado}" style="flex-shrink:0;">${ESTADO_LABEL[exp.estado]}</span>
        </div>
      </div>

      <div class="card" style="padding:var(--s4);margin-bottom:var(--s3);">
        <div style="display:flex;flex-direction:column;gap:var(--s4);">
          <div>
            <div style="font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Motivo de rechazo</div>
            <div style="font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-base);">${exp.motivo}</div>
          </div>
          ${exp.observaciones ? `
          <div>
            <div style="font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Observaciones</div>
            <div style="font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--leading-base);">${exp.observaciones}</div>
          </div>` : ''}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s4);">
            <div>
              <div style="font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Jefe de equipo</div>
              <div style="font-size:var(--text-sm);font-weight:600;color:var(--text-primary);">${exp.jefe?.nombre ?? '—'}</div>
            </div>
            <div>
              <div style="font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Técnico</div>
              <div style="font-size:var(--text-sm);color:var(--text-primary);">${exp.tecnico?.nombre ?? '—'}</div>
            </div>
            <div>
              <div style="font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Creado</div>
              <div style="font-size:var(--text-sm);color:var(--text-secondary);">${fmtFecha(exp.fecha_creacion)}</div>
            </div>
            ${exp.fecha_rescate ? `
            <div>
              <div style="font-size:var(--text-xs);font-weight:600;color:var(--rescatada-text);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Rescatada</div>
              <div style="font-size:var(--text-sm);color:var(--rescatada-text);font-weight:600;">${fmtFecha(exp.fecha_rescate)}</div>
            </div>` : ''}
          </div>
          ${exp.creador ? `
          <div style="padding-top:var(--s3);border-top:1px solid var(--border);font-size:var(--text-xs);color:var(--text-tertiary);">
            Creado por <strong style="color:var(--text-secondary);">${exp.creador.nombre}</strong>
          </div>` : ''}
        </div>
      </div>

      ${esSupervisor ? `
      <button class="btn btn-secondary btn-block" style="margin-bottom:var(--s3);" onclick="window.__mostrarEdicion()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
        Editar expediente
      </button>` : ''}

      <div id="edit-form" style="display:none;margin-bottom:var(--s3);">
        <div class="card" style="padding:var(--s4);">
          <div style="font-size:var(--text-base);font-weight:700;color:var(--text-primary);margin-bottom:var(--s4);">Editar expediente</div>
          <form id="form-editar" style="display:flex;flex-direction:column;gap:var(--s4);" novalidate>
            <div class="form-group">
              <label class="form-label" for="ef-instalacion">Instalación</label>
              <input id="ef-instalacion" class="input" type="text" value="${exp.instalacion}" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="ef-mantenimiento">Nº de mantenimiento</label>
              <input id="ef-mantenimiento" class="input" type="text" value="${exp.mantenimiento}" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="ef-jefe">Jefe de equipo</label>
              <select id="ef-jefe" class="select"><option>Cargando…</option></select>
            </div>
            <div class="form-group">
              <label class="form-label" for="ef-tecnico">Técnico</label>
              <select id="ef-tecnico" class="select" disabled><option value="">— Sin técnico —</option></select>
            </div>
            <div class="form-group">
              <label class="form-label" for="ef-motivo">Motivo de rechazo</label>
              <textarea id="ef-motivo" class="textarea">${exp.motivo}</textarea>
            </div>
            <div class="form-group">
              <label class="form-label" for="ef-observaciones">Observaciones</label>
              <textarea id="ef-observaciones" class="textarea">${exp.observaciones ?? ''}</textarea>
            </div>
            <div id="edit-error" role="alert" style="display:none;background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--r-md);padding:10px 14px;font-size:var(--text-sm);color:var(--danger-text);font-weight:500;"></div>
            <div style="display:flex;gap:var(--s3);">
              <button type="button" class="btn btn-secondary" onclick="document.getElementById('edit-form').style.display='none'">Cancelar</button>
              <button type="submit" id="btn-editar" class="btn btn-primary" style="flex:1;">Guardar cambios</button>
            </div>
          </form>
        </div>
      </div>
    `;
  }

  // ── Cargar expediente ──────────────────────────────────────
  let expediente;
  try {
    expediente = await obtenerExpediente(id);
    renderDetalle(expediente);
  } catch (err) {
    wrap.innerHTML = `<div class="empty-state"><p style="color:var(--danger);font-size:var(--text-sm);">Error al cargar: ${err.message}</p></div>`;
    return;
  }

  // Mostrar sección de comentarios e input
  document.getElementById('coment-section').style.display = 'block';
  if (puedeCommentar) {
    document.getElementById('coment-input-bar').style.display = 'block';
  }

  // ── Máquina de estados ─────────────────────────────────────
  const TODOS_ESTADOS  = ['pendiente', 'en_gestion', 'pendiente_revision', 'rescatada', 'cerrada'];
  const TERMINALES     = new Set(['rescatada', 'cerrada']);

  // Jefe de equipo: solo avance lineal
  const TRANSICIONES_JEFE = {
    pendiente:          ['en_gestion'],
    en_gestion:         ['pendiente_revision'],
    pendiente_revision: [],
    rescatada:          [],
    cerrada:            [],
  };

  const ACCION_LABEL = {
    pendiente:          'Volver a pendiente',
    en_gestion:         'Marcar en gestión',
    pendiente_revision: 'Solicitar revisión',
    rescatada:          'Marcar como rescatada',
    cerrada:            'Cerrar expediente',
  };

  const ACCION_COLOR = {
    pendiente:          'var(--pendiente-accent)',
    en_gestion:         'var(--gestion-accent)',
    pendiente_revision: 'var(--revision-accent)',
    rescatada:          'var(--rescatada-accent)',
    cerrada:            'var(--cerrada-accent)',
  };

  function renderEstado(exp) {
    const seccion = document.getElementById('estado-section');
    if (!seccion) return;

    const rol = user?.rol;

    // Estado terminal — nadie puede salir
    if (TERMINALES.has(exp.estado)) {
      seccion.style.display = 'block';
      const esRescatada = exp.estado === 'rescatada';
      seccion.innerHTML = `
        <div style="
          padding:var(--s3) var(--s4);
          background:${esRescatada ? 'var(--rescatada-bg)' : 'var(--cerrada-bg)'};
          border:1px solid ${esRescatada ? 'var(--rescatada-border)' : 'var(--cerrada-border)'};
          border-radius:var(--r-md);
          font-size:var(--text-xs);font-weight:600;
          color:${esRescatada ? 'var(--rescatada-text)' : 'var(--cerrada-text)'};
        ">
          Expediente ${ESTADO_LABEL[exp.estado].toLowerCase()} — el estado no puede cambiar.
        </div>`;
      return;
    }

    // Opciones según rol
    let opciones = [];
    if (rol === 'supervisor') {
      opciones = TODOS_ESTADOS.filter(e => e !== exp.estado);
    } else if (rol === 'jefe_equipo') {
      opciones = TRANSICIONES_JEFE[exp.estado] ?? [];
    }

    if (!opciones.length) {
      seccion.style.display = 'none';
      return;
    }

    seccion.style.display = 'block';
    seccion.innerHTML = `
      <div class="card" style="padding:var(--s4);">
        <div style="font-size:var(--text-xs);font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:var(--s3);">Cambiar estado</div>
        <div id="estado-btns" style="display:flex;flex-direction:column;gap:var(--s2);">
          ${opciones.map(est => `
            <button
              class="btn btn-secondary"
              onclick="${TERMINALES.has(est) ? `window.__confirmarEstado('${exp.id}','${est}')` : `window.__cambiarEstado('${exp.id}','${est}')`}"
              data-estado="${est}"
              style="justify-content:flex-start;gap:var(--s2);border-left:3px solid ${ACCION_COLOR[est]};"
            >
              ${ACCION_LABEL[est]}
            </button>
          `).join('')}
        </div>
        <div id="estado-error" style="display:none;margin-top:var(--s3);background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--r-md);padding:10px 14px;font-size:var(--text-sm);color:var(--danger-text);font-weight:500;"></div>
      </div>
    `;
  }

  // Confirm obligatorio antes de pasar a estado terminal
  window.__confirmarEstado = function (expedienteId, nuevoEstado) {
    const label = ESTADO_LABEL[nuevoEstado];
    if (confirm(`¿Marcás este expediente como "${label}"?\n\nEsta acción es irreversible — el estado no podrá cambiar más.`)) {
      window.__cambiarEstado(expedienteId, nuevoEstado);
    }
  };

  window.__cambiarEstado = async function (expedienteId, nuevoEstado) {
    const btns    = document.querySelectorAll('#estado-btns button');
    const errorEl = document.getElementById('estado-error');
    btns.forEach(b => { b.disabled = true; b.style.opacity = '0.6'; });
    if (errorEl) errorEl.style.display = 'none';
    try {
      await cambiarEstado(expedienteId, nuevoEstado);
      window.__navigate(`#/expediente?id=${expedienteId}`);
    } catch (err) {
      if (errorEl) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
      btns.forEach(b => { b.disabled = false; b.style.opacity = '1'; });
    }
  };

  renderEstado(expediente);

  // ── Edición (supervisor) ───────────────────────────────────
  window.__mostrarEdicion = async function () {
    const editForm = document.getElementById('edit-form');
    editForm.style.display = 'block';
    editForm.scrollIntoView({ behavior: 'smooth', block: 'start' });

    const efJefe    = document.getElementById('ef-jefe');
    const efTecnico = document.getElementById('ef-tecnico');

    try {
      const jefes = await listarJefesEquipo();
      efJefe.innerHTML = jefes.map(j =>
        `<option value="${j.id}" ${j.id === expediente.jefe?.id ? 'selected' : ''}>${j.nombre}</option>`
      ).join('');
      if (expediente.jefe?.id) {
        const ts = await listarTecnicosPorJefe(expediente.jefe.id);
        efTecnico.disabled = false;
        efTecnico.innerHTML =
          '<option value="">— Sin técnico —</option>' +
          ts.map(t => `<option value="${t.id}" ${t.id === expediente.tecnico?.id ? 'selected' : ''}>${t.nombre}</option>`).join('');
      }
    } catch {}

    efJefe.addEventListener('change', async () => {
      efTecnico.disabled = true;
      efTecnico.innerHTML = '<option value="">Cargando…</option>';
      if (!efJefe.value) { efTecnico.innerHTML = '<option value="">— Sin técnico —</option>'; return; }
      try {
        const ts = await listarTecnicosPorJefe(efJefe.value);
        efTecnico.disabled = false;
        efTecnico.innerHTML = '<option value="">— Sin técnico —</option>' +
          ts.map(t => `<option value="${t.id}">${t.nombre}</option>`).join('');
      } catch {}
    });

    document.getElementById('form-editar').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const errorEl = document.getElementById('edit-error');
      const btn     = document.getElementById('btn-editar');
      errorEl.style.display = 'none';
      const campos = {
        instalacion:   document.getElementById('ef-instalacion').value.trim(),
        mantenimiento: document.getElementById('ef-mantenimiento').value.trim(),
        jefe_id:       efJefe.value,
        tecnico_id:    efTecnico.value || null,
        motivo:        document.getElementById('ef-motivo').value.trim(),
        observaciones: document.getElementById('ef-observaciones').value.trim() || null,
      };
      if (!campos.instalacion || !campos.mantenimiento || !campos.jefe_id || !campos.motivo) {
        errorEl.textContent = 'Completá los campos obligatorios.';
        errorEl.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner spinner-light" style="width:18px;height:18px;"></div>';
      try {
        await actualizarExpediente(id, campos);
        window.__navigate(`#/expediente?id=${id}`);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Guardar cambios';
      }
    });
  };

  // ── Comentarios ────────────────────────────────────────────
  async function renderComentarios() {
    const threadEl = document.getElementById('coment-thread');
    if (!threadEl) return;

    try {
      const comentarios = await listarComentarios(id);

      if (!comentarios.length) {
        threadEl.innerHTML = `
          <div style="text-align:center;padding:var(--s8) var(--s4);font-size:var(--text-sm);color:var(--text-tertiary);">
            Todavía no hay comentarios.
          </div>`;
        return;
      }

      const items = await Promise.all(comentarios.map(async c => {
        const esPropio = c.usuario?.id === user?.id;
        const hora = new Date(c.fecha).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        const dia  = new Date(c.fecha).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });

        let imgsHtml = '';
        if (c.imagenes?.length) {
          const urls = await Promise.all(c.imagenes.map(img => urlFirmada(img.url)));
          imgsHtml = `
            <div class="bubble-images" style="max-width:${Math.min(c.imagenes.length, 3) * 70}px;margin-top:6px;">
              ${urls.map(u => `<img src="${u}" alt="Foto adjunta" onclick="window.__verFoto('${u}')" loading="lazy" style="cursor:zoom-in;" />`).join('')}
            </div>`;
        }

        return `
          <div class="bubble-wrap ${esPropio ? 'own' : 'other'}">
            <div class="bubble-author">${esPropio ? 'Tú' : (c.usuario?.nombre ?? '—')}</div>
            <div class="bubble ${esPropio ? 'own' : 'other'}">
              ${c.comentario ? `<div style="word-break:break-word;">${c.comentario}</div>` : ''}
              ${imgsHtml}
            </div>
            <div class="bubble-time">${dia} · ${hora}</div>
          </div>`;
      }));

      threadEl.innerHTML = items.join('');
      threadEl.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } catch (err) {
      threadEl.innerHTML = `<p style="color:var(--danger);font-size:var(--text-sm);padding:var(--s4);">${err.message}</p>`;
    }
  }

  // Lightbox
  window.__verFoto = function (url) {
    const box = document.createElement('div');
    box.className = 'lightbox';
    box.innerHTML = `
      <img src="${url}" alt="Foto ampliada" />
      <button class="lightbox-close" onclick="this.parentNode.remove()" aria-label="Cerrar">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>`;
    box.addEventListener('click', e => { if (e.target === box) box.remove(); });
    document.body.appendChild(box);
  };

  // Fotos seleccionadas pendientes de envío
  let fotasPendientes = [];

  function actualizarBoton() {
    const texto = document.getElementById('coment-texto')?.value.trim();
    const btn   = document.getElementById('btn-send');
    if (btn) btn.disabled = !texto && !fotasPendientes.length;
  }

  function renderPreview() {
    const previewEl = document.getElementById('fotos-preview');
    if (!previewEl) return;
    if (!fotasPendientes.length) {
      previewEl.style.display = 'none';
      return;
    }
    previewEl.style.display = 'flex';
    previewEl.innerHTML = fotasPendientes.map((f, i) => `
      <div style="position:relative;width:52px;height:52px;border-radius:var(--r-sm);overflow:hidden;flex-shrink:0;border:1.5px solid var(--border-strong);">
        <img src="${URL.createObjectURL(f)}" style="width:100%;height:100%;object-fit:cover;" />
        <button
          onclick="window.__quitarFoto(${i})"
          style="position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.65);border:none;color:white;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;"
          aria-label="Quitar foto"
        >×</button>
      </div>`).join('');
  }

  window.__quitarFoto = function (idx) {
    fotasPendientes.splice(idx, 1);
    renderPreview();
    actualizarBoton();
  };

  // Selección de fotos
  document.getElementById('foto-input')?.addEventListener('change', e => {
    fotasPendientes = [...fotasPendientes, ...Array.from(e.target.files)];
    e.target.value = '';
    renderPreview();
    actualizarBoton();
  });

  // Textarea → habilitar/deshabilitar botón
  document.getElementById('coment-texto')?.addEventListener('input', actualizarBoton);

  // Enviar comentario
  document.getElementById('btn-send')?.addEventListener('click', async () => {
    const textoEl = document.getElementById('coment-texto');
    const btn     = document.getElementById('btn-send');
    const texto   = textoEl?.value.trim() || null;
    const fotos   = [...fotasPendientes];

    if (!texto && !fotos.length) return;

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner spinner-light" style="width:16px;height:16px;"></div>';

    try {
      const comentario = await crearComentario(id, user.id, texto);

      // Subir fotos una a una (sin bloquear si falla alguna)
      for (const foto of fotos) {
        try {
          await subirFoto(comentario.id, id, foto);
        } catch (err) {
          console.error('[fotos]', err.message);
        }
      }

      // Limpiar input
      if (textoEl) textoEl.value = '';
      fotasPendientes = [];
      renderPreview();

      // Recargar comentarios
      await renderComentarios();
    } catch (err) {
      alert(err.message);
    } finally {
      btn.innerHTML = `
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>`;
      actualizarBoton();
    }
  });

  // Carga inicial de comentarios
  renderComentarios();
})();
</script>
